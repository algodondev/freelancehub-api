services:
  postgres:
    image: postgres:16-alpine
    container_name: freelancehub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-freelancehub}
      POSTGRES_USER: ${DB_USERNAME:-freelancehub}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-freelancehub}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-freelancehub} -d ${DB_NAME:-freelancehub}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
